<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - DC Telemática</title>
    
    <!-- Librerías para exportar a Excel y PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --brand-blue: #333F7A; 
            --brand-red: #E53336;  
            --bg-color: #f4f6f9;
            --text-color: #333333;
            --border-color: #dce1e6;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; }

        /* Login */
        #login-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: #e2e8f0; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background-color: var(--brand-blue); color: white; border: none; border-radius: 6px; cursor: pointer; }

        /* Dashboard */
        #dashboard-view { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .btn-logout { background-color: #f1f5f9; color: var(--brand-red); border: 1px solid #cbd5e1; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border-color); text-align: left; }
        th { background-color: #f8fafc; color: var(--brand-blue); }

        .btn-action { background: none; border: none; cursor: pointer; font-size: 1.2rem; margin: 0 5px; }
        
        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background-color: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; }
        .form-control { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; }
        .btn-save { background-color: var(--brand-blue); color: white; padding: 10px; border: none; border-radius: 6px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-view">
        <div class="login-box">
            <h2>Acceso Administrativo</h2>
            <form id="loginForm">
                <input type="email" id="adminEmail" placeholder="Correo" required>
                <input type="password" id="adminPass" placeholder="Contraseña" required>
                <button type="submit">Ingresar</button>
            </form>
        </div>
    </div>

    <div id="dashboard-view">
        <header>
            <div><h1>Panel de Auditoría</h1></div>
            <button class="btn-logout" id="btnLogout">Cerrar Sesión</button>
        </header>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>N° Reg</th>
                        <th>ID Punto</th>
                        <th>Ubicación</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h3>Editar Registro</h3>
            <form id="editForm">
                <input type="hidden" id="editRecordId">
                <input type="text" id="editPunto" class="form-control" placeholder="ID Punto" required>
                <input type="text" id="editUbicacion" class="form-control" placeholder="Ubicación" required>
                <button type="submit" class="btn-save">Guardar</button>
                <button type="button" style="margin-top:10px; width:100%;" onclick="document.getElementById('editModal').style.display='none'">Cancelar</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuJtE7VKOm1wG5BEd_pde8_9aDaq33j8E",
            authDomain: "dc-telematica-auditoria.firebaseapp.com",
            projectId: "dc-telematica-auditoria",
            storageBucket: "dc-telematica-auditoria.firebasestorage.app",
            messagingSenderId: "1052355352106",
            appId: "1:1052355352106:web:8d9a81c06959bda325d553",
            measurementId: "G-XBXH4DEMBD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let globalData = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('dashboard-view').style.display = 'block';
                cargarDatos();
            } else {
                document.getElementById('login-view').style.display = 'flex';
                document.getElementById('dashboard-view').style.display = 'none';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch { alert("Credenciales incorrectas."); }
        });

        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth).then(() => window.location.assign("index.html")));

        async function cargarDatos() {
            const q = query(collection(db, "inspecciones"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            globalData = [];
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                globalData.push({ id: doc.id, ...data });
                tbody.innerHTML += `<tr>
                    <td>${data.registro_num || '-'}</td>
                    <td>${data.punto_id || '-'}</td>
                    <td>${data.ubicacion || '-'}</td>
                    <td>
                        <button class="btn-action" onclick="abrirEdicion('${doc.id}')">✏️</button>
                        <button class="btn-action" onclick="eliminarRegistro('${doc.id}')">🗑️</button>
                    </td>
                </tr>`;
            });
        }

        window.abrirEdicion = (id) => {
            const reg = globalData.find(r => r.id === id);
            document.getElementById('editRecordId').value = id;
            document.getElementById('editPunto').value = reg.punto_id;
            document.getElementById('editUbicacion').value = reg.ubicacion;
            document.getElementById('editModal').style.display = 'flex';
        };

        window.eliminarRegistro = async (id) => {
            if (confirm("¿Eliminar este registro?")) {
                await deleteDoc(doc(db, "inspecciones", id));
                cargarDatos();
            }
        };

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editRecordId').value;
            await updateDoc(doc(db, "inspecciones", id), {
                punto_id: document.getElementById('editPunto').value,
                ubicacion: document.getElementById('editUbicacion').value
            });
            document.getElementById('editModal').style.display = 'none';
            cargarDatos();
        });
    </script>
</body>
</html>
